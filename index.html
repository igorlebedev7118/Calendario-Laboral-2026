<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendario de Vacaciones 2026</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f5f7;
      color: #222;
    }

    .app {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 360px;
      background: #ffffff;
      border-right: 1px solid #d9dce1;
      padding: 18px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }

    .sidebar h2 {
      margin: 0 0 16px 0;
      font-size: 30px;
    }

    .field {
      margin-bottom: 14px;
    }

    .field label {
      display: block;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .select-input,
    .text-input,
    .btn,
    .color-input {
      width: 100%;
      border-radius: 10px;
      border: 1px solid #cfd5dd;
      font-size: 15px;
    }

    .select-input,
    .text-input {
      padding: 11px 12px;
      background: #fff;
    }

    .color-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .color-input {
      height: 42px;
      padding: 4px;
      background: #fff;
      cursor: pointer;
    }

    .color-preview {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      border: 1px solid #cfd5dd;
      flex-shrink: 0;
    }

    .btn {
      padding: 11px 12px;
      background: #f7f8fa;
      cursor: pointer;
      margin-bottom: 10px;
      font-weight: 600;
      transition: 0.15s ease;
    }

    .btn:hover {
      background: #eef2f7;
    }

    .btn.primary {
      background: #1f6feb;
      color: #fff;
      border-color: #1f6feb;
    }

    .btn.primary:hover {
      background: #185bcc;
    }

    .btn.secondary {
      background: #111827;
      color: #fff;
      border-color: #111827;
    }

    .btn.secondary:hover {
      background: #1f2937;
    }

    .status {
      background: #f7f8fa;
      border: 1px solid #dde2e8;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      margin: 14px 0;
      line-height: 1.45;
    }

    .counter {
      font-size: 16px;
      font-weight: 700;
      margin: 12px 0 18px;
    }

    .role-box {
      padding: 10px 12px;
      border: 1px solid #dde2e8;
      border-radius: 10px;
      background: #f7f8fa;
      font-size: 14px;
      margin-bottom: 14px;
      line-height: 1.4;
    }

    .saved-list-title {
      margin: 18px 0 10px;
      font-size: 24px;
    }

    .saved-item {
      border: 1px solid #dde2e8;
      border-radius: 10px;
      background: #fafbfc;
      padding: 10px;
      margin-bottom: 10px;
      font-size: 14px;
      line-height: 1.45;
    }

    .saved-item-header {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .saved-color {
      width: 14px;
      height: 14px;
      border-radius: 4px;
      border: 1px solid rgba(0, 0, 0, 0.15);
      flex-shrink: 0;
    }

    .saved-item-subtitle {
      font-size: 12px;
      color: #555;
      margin-bottom: 6px;
    }

    .calendar-wrap {
      flex: 1;
      padding: 18px;
      overflow-x: auto;
    }

    .calendar {
      display: grid;
      grid-template-columns: repeat(3, minmax(280px, 1fr));
      gap: 18px;
    }

    .month {
      background: #fff;
      border: 1px solid #d9dce1;
      border-radius: 14px;
      padding: 12px;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.03);
      break-inside: avoid;
      page-break-inside: avoid;
    }

    .month-title {
      font-size: 22px;
      font-weight: 700;
      margin: 0 0 10px 0;
    }

    .weekdays,
    .days-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
    }

    .weekday {
      text-align: center;
      font-size: 12px;
      font-weight: 700;
      color: #6b7280;
      padding: 6px 0;
    }

    .empty-cell {
      min-height: 56px;
    }

    .day {
      min-height: 62px;
      border: 1px solid #d8dde6;
      border-radius: 10px;
      background: #fff;
      padding: 4px;
      cursor: pointer;
      user-select: none;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: box-shadow 0.12s ease, transform 0.05s ease;
      overflow: hidden;
    }

    .day:hover {
      box-shadow: 0 0 0 2px rgba(31, 111, 235, 0.12);
    }

    .day.blocked {
      cursor: not-allowed;
      opacity: 0.95;
    }

    .day.selected-temp {
      outline: 3px solid #111827;
      outline-offset: -3px;
    }

    .day-number {
      font-size: 13px;
      font-weight: 700;
      text-align: right;
    }

    .day-name {
      font-size: 10px;
      line-height: 1.15;
      text-align: center;
      word-break: break-word;
      padding: 0 2px 2px;
    }

    .helper {
      font-size: 12px;
      color: #666;
      margin-top: 4px;
      line-height: 1.35;
    }

    .print-header {
      display: none;
    }

    .print-summary {
      display: none;
    }

    @media (max-width: 1200px) {
      .calendar {
        grid-template-columns: repeat(2, minmax(280px, 1fr));
      }
    }

    @media (max-width: 900px) {
      .app {
        display: block;
      }

      .sidebar {
        width: 100%;
        height: auto;
        position: static;
        border-right: none;
        border-bottom: 1px solid #d9dce1;
      }

      .calendar {
        grid-template-columns: 1fr;
      }
    }

    @media print {
      body {
        background: #fff;
      }

      .app {
        display: block;
      }

      .sidebar {
        display: none;
      }

      .calendar-wrap {
        padding: 0;
        overflow: visible;
      }

      .print-header {
        display: block;
        margin-bottom: 18px;
      }

      .print-header h1 {
        margin: 0 0 8px 0;
        font-size: 24px;
      }

      .print-header p {
        margin: 0;
        font-size: 12px;
        color: #444;
      }

      .print-summary {
        display: block;
        margin-bottom: 20px;
      }

      .print-summary h2 {
        margin: 0 0 10px 0;
        font-size: 18px;
      }

      .print-summary-item {
        border: 1px solid #ccc;
        border-radius: 8px;
        padding: 8px 10px;
        margin-bottom: 8px;
        break-inside: avoid;
        page-break-inside: avoid;
      }

      .calendar {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 14px;
      }

      .month {
        box-shadow: none;
      }

      .day {
        cursor: default;
      }

      .helper {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <h2>Calendario 2026</h2>

      <div class="field">
        <label for="employeeSelect">Empleado</label>
        <select id="employeeSelect" class="select-input"></select>
      </div>

      <div class="field">
        <label for="pinInput">PIN</label>
        <input id="pinInput" class="text-input" type="password" placeholder="Introduce tu PIN" />
      </div>

      <div class="field" id="targetField" style="display: none;">
        <label for="targetSelect">Editar vacaciones de</label>
        <select id="targetSelect" class="select-input"></select>
      </div>

      <div class="role-box" id="roleInfo">
        Selecciona tu nombre y tu PIN para poder editar vacaciones.
      </div>

      <div class="field">
        <label for="color">Elegir su color</label>
        <div class="color-row">
          <input id="color" class="color-input" type="color" value="#22c55e" />
          <div id="colorPreview" class="color-preview"></div>
        </div>
        <div class="helper">
          Puedes cambiar el color de tus vacaciones antes de guardar.
        </div>
      </div>

      <button class="btn" id="editBtn">Editar vacaciones</button>
      <button class="btn" id="clearSelectionBtn">Limpiar selección</button>
      <button class="btn primary" id="saveBtn">Guardar vacaciones</button>
      <button class="btn" id="clearMineBtn">Borrar vacaciones</button>
      <button class="btn secondary" id="exportPdfBtn">Exportar a PDF</button>

      <div class="counter" id="counter">Días seleccionados: 0 / 21</div>

      <div class="status" id="status">
        Selecciona tu nombre, escribe tu PIN y elige los días de vacaciones.
      </div>

      <h3 class="saved-list-title">Vacaciones</h3>
      <div id="list"></div>
    </aside>

    <main class="calendar-wrap">
      <div class="print-header" id="printHeader">
        <h1>Calendario de Vacaciones 2026</h1>
        <p id="printDate"></p>
      </div>

      <div class="print-summary" id="printSummary"></div>

      <div id="calendar" class="calendar"></div>
    </main>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAnaz1QNDKh2kQLyMjj1IZ-7GNivIar3Xs",
      authDomain: "calendario-laboral-2026-5305e.firebaseapp.com",
      databaseURL: "https://calendario-laboral-2026-5305e-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "calendario-laboral-2026-5305e",
      storageBucket: "calendario-laboral-2026-5305e.firebasestorage.app",
      messagingSenderId: "54390898052",
      appId: "1:54390898052:web:e35ef5feec90efdb5bf1d1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const EMPLOYEES = [
      {
        id: "igor",
        shortName: "Igor",
        fullName: "Igor Liebiediev",
        role: "gerente",
        aliases: ["Igor", "Igor Liebiediev", "Liebiediev"],
        pin: "3454",
        color: "#22c55e",
        admin: true
      },
      {
        id: "victor-alexis",
        shortName: "Victor",
        fullName: "Victor Alexis Mantilla Bueno",
        role: "encargado",
        aliases: ["Victor", "Alexis", "Victor Alexis", "Victor Alexis Mantilla Bueno", "Mantilla"],
        pin: "2231",
        color: "#14b8a6",
        admin: false
      },
      {
        id: "jimmy",
        shortName: "Jimmy",
        fullName: "Jimmy Caizaguano Palomo",
        role: "ayudante de cocina",
        aliases: ["Jimmy", "Jimmy Caizaguano", "Jimmy Caizaguano Palomo", "Caizaguano"],
        pin: "0213",
        color: "#f59e0b",
        admin: false
      },
      {
        id: "tamara",
        shortName: "Tamara",
        fullName: "Chirley Tamara Mendoza Espinoza",
        role: "camarera",
        aliases: ["Tamara", "Chirley", "Chirley Tamara", "Chirley Tamara Mendoza Espinoza"],
        pin: "2162",
        color: "#ef4444",
        admin: false
      },
      {
        id: "lorena",
        shortName: "Lorena",
        fullName: "Lorena Rojas Claure",
        role: "camarera",
        aliases: ["Lorena", "Lorena Rojas", "Lorena Rojas Claure", "Rojas"],
        pin: "1211",
        color: "#a855f7",
        admin: false
      },
      {
        id: "deiner",
        shortName: "Deiner",
        fullName: "Deiner Javier Uyuquipa Rios",
        role: "ayudante de cocina",
        aliases: ["Deiner", "Deiner Javier", "Deiner Javier Uyuquipa Rios", "Uyuquipa"],
        pin: "6805",
        color: "#3b82f6",
        admin: false
      }
    ];

    const EMPLOYEE_MAP = Object.fromEntries(EMPLOYEES.map(emp => [emp.id, emp]));
    const MAX_DAYS = 21;

    const monthNames = [
      "Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio",
      "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"
    ];

    const weekDays = ["L", "M", "X", "J", "V", "S", "D"];

    const calendarEl = document.getElementById("calendar");
    const listEl = document.getElementById("list");
    const counterEl = document.getElementById("counter");
    const statusEl = document.getElementById("status");
    const colorEl = document.getElementById("color");
    const colorPreviewEl = document.getElementById("colorPreview");
    const editBtn = document.getElementById("editBtn");
    const clearSelectionBtn = document.getElementById("clearSelectionBtn");
    const saveBtn = document.getElementById("saveBtn");
    const clearMineBtn = document.getElementById("clearMineBtn");
    const exportPdfBtn = document.getElementById("exportPdfBtn");
    const employeeSelectEl = document.getElementById("employeeSelect");
    const targetSelectEl = document.getElementById("targetSelect");
    const targetFieldEl = document.getElementById("targetField");
    const pinInputEl = document.getElementById("pinInput");
    const roleInfoEl = document.getElementById("roleInfo");
    const printDateEl = document.getElementById("printDate");
    const printSummaryEl = document.getElementById("printSummary");

    const dayElements = new Map();

    let vacations = {};
    let tempSelection = new Set();
    let isMouseDown = false;
    let dragMode = null;

    function normalizeText(value) {
      return (value || "")
        .trim()
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "");
    }

    function populateSelects() {
      employeeSelectEl.innerHTML = "";
      targetSelectEl.innerHTML = "";

      for (const emp of EMPLOYEES) {
        const optionUser = document.createElement("option");
        optionUser.value = emp.id;
        optionUser.textContent = emp.shortName;
        employeeSelectEl.appendChild(optionUser);

        const optionTarget = document.createElement("option");
        optionTarget.value = emp.id;
        optionTarget.textContent = emp.shortName;
        targetSelectEl.appendChild(optionTarget);
      }

      employeeSelectEl.value = "igor";
      targetSelectEl.value = "igor";
    }

    function getSelectedEmployee() {
      return EMPLOYEE_MAP[employeeSelectEl.value] || null;
    }

    function getTargetEmployee() {
      const current = getSelectedEmployee();
      if (!current) return null;
      return current.admin ? (EMPLOYEE_MAP[targetSelectEl.value] || null) : current;
    }

    function isAuthenticated() {
      const current = getSelectedEmployee();
      if (!current) return false;
      return pinInputEl.value.trim() === current.pin;
    }

    function updateRoleUI() {
      const current = getSelectedEmployee();
      if (!current) return;

      targetFieldEl.style.display = current.admin ? "block" : "none";

      if (current.admin) {
        roleInfoEl.textContent = `${current.shortName} (${current.role}) puede editar las vacaciones de cualquier empleado.`;
      } else {
        roleInfoEl.textContent = `${current.shortName} (${current.role}) solo puede editar sus propias vacaciones.`;
      }

      const target = getTargetEmployee();
      if (target && tempSelection.size === 0) {
        colorEl.value = getStoredOrDefaultColor(target.id);
      }

      updateColorPreview();
      updateDayStates();
      renderSavedList();
      renderPrintSummary();
    }

    function updateStatus(message) {
      statusEl.textContent = message;
    }

    function updateCounter() {
      counterEl.textContent = `Días seleccionados: ${tempSelection.size} / ${MAX_DAYS}`;
    }

    function updateColorPreview() {
      colorPreviewEl.style.backgroundColor = colorEl.value;
    }

    function makeDateKey(monthIndex, day) {
      return `2026-${String(monthIndex + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
    }

    function getMonthOffset(monthIndex) {
      const day = new Date(2026, monthIndex, 1).getDay();
      return day === 0 ? 6 : day - 1;
    }

    function formatDate(dateKey) {
      const [year, month, day] = dateKey.split("-");
      return `${day}/${month}/${year}`;
    }

    function formatExportDate() {
      const now = new Date();
      return now.toLocaleString("es-ES", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function getOccupantByDate(dateKey) {
      for (const [employeeId, record] of Object.entries(vacations)) {
        const dates = Array.isArray(record.dates) ? record.dates : [];
        if (dates.includes(dateKey)) {
          return {
            employeeId,
            shortName: record.shortName || employeeId,
            fullName: record.fullName || record.shortName || employeeId,
            role: record.role || "",
            color: record.color || "#cccccc"
          };
        }
      }
      return null;
    }

    function getStoredOrDefaultColor(employeeId) {
      if (vacations[employeeId]?.color) return vacations[employeeId].color;
      return EMPLOYEE_MAP[employeeId]?.color || "#22c55e";
    }

    function canTargetEditDate(dateKey) {
      const target = getTargetEmployee();
      if (!target) return false;

      const occupant = getOccupantByDate(dateKey);
      if (!occupant) return true;
      return occupant.employeeId === target.id;
    }

    function renderSavedList() {
      listEl.innerHTML = "";

      const entries = Object.entries(vacations).sort((a, b) => {
        const aName = a[1].shortName || "";
        const bName = b[1].shortName || "";
        return normalizeText(aName).localeCompare(normalizeText(bName));
      });

      if (entries.length === 0) {
        listEl.innerHTML = `<div class="saved-item">Todavía no hay vacaciones guardadas.</div>`;
        return;
      }

      for (const [employeeId, record] of entries) {
        const item = document.createElement("div");
        item.className = "saved-item";

        const header = document.createElement("div");
        header.className = "saved-item-header";

        const color = document.createElement("div");
        color.className = "saved-color";
        color.style.backgroundColor = record.color || "#cccccc";

        const title = document.createElement("div");
        title.textContent = `${record.shortName || employeeId} (${(record.dates || []).length} días)`;

        header.appendChild(color);
        header.appendChild(title);

        const subtitle = document.createElement("div");
        subtitle.className = "saved-item-subtitle";
        subtitle.textContent = `${record.fullName || ""}${record.role ? " • " + record.role : ""}`;

        const dates = document.createElement("div");
        const sortedDates = [...(record.dates || [])].sort();
        dates.textContent = sortedDates.length
          ? sortedDates.map(formatDate).join(", ")
          : "Sin fechas";

        item.appendChild(header);
        item.appendChild(subtitle);
        item.appendChild(dates);
        listEl.appendChild(item);
      }
    }

    function renderPrintSummary() {
      printSummaryEl.innerHTML = "";
      printDateEl.textContent = `Fecha de exportación: ${formatExportDate()}`;

      const entries = Object.entries(vacations).sort((a, b) => {
        const aName = a[1].shortName || "";
        const bName = b[1].shortName || "";
        return normalizeText(aName).localeCompare(normalizeText(bName));
      });

      const title = document.createElement("h2");
      title.textContent = "Resumen de vacaciones";
      printSummaryEl.appendChild(title);

      if (entries.length === 0) {
        const empty = document.createElement("div");
        empty.className = "print-summary-item";
        empty.textContent = "Todavía no hay vacaciones guardadas.";
        printSummaryEl.appendChild(empty);
        return;
      }

      for (const [, record] of entries) {
        const item = document.createElement("div");
        item.className = "print-summary-item";

        const sortedDates = [...(record.dates || [])].sort();
        item.innerHTML = `
          <strong>${record.shortName || ""}</strong><br>
          <span>${record.fullName || ""}${record.role ? " • " + record.role : ""}</span><br>
          <span>${sortedDates.length} días</span><br>
          <span>${sortedDates.length ? sortedDates.map(formatDate).join(", ") : "Sin fechas"}</span>
        `;

        printSummaryEl.appendChild(item);
      }
    }

    function createCalendar() {
      calendarEl.innerHTML = "";
      dayElements.clear();

      for (let monthIndex = 0; monthIndex < 12; monthIndex++) {
        const monthEl = document.createElement("section");
        monthEl.className = "month";

        const title = document.createElement("h3");
        title.className = "month-title";
        title.textContent = monthNames[monthIndex];

        const weekdaysEl = document.createElement("div");
        weekdaysEl.className = "weekdays";

        for (const wd of weekDays) {
          const wdEl = document.createElement("div");
          wdEl.className = "weekday";
          wdEl.textContent = wd;
          weekdaysEl.appendChild(wdEl);
        }

        const grid = document.createElement("div");
        grid.className = "days-grid";

        const offset = getMonthOffset(monthIndex);
        for (let i = 0; i < offset; i++) {
          const empty = document.createElement("div");
          empty.className = "empty-cell";
          grid.appendChild(empty);
        }

        const daysInMonth = new Date(2026, monthIndex + 1, 0).getDate();

        for (let day = 1; day <= daysInMonth; day++) {
          const dateKey = makeDateKey(monthIndex, day);

          const dayEl = document.createElement("div");
          dayEl.className = "day";
          dayEl.dataset.dateKey = dateKey;

          const numberEl = document.createElement("div");
          numberEl.className = "day-number";
          numberEl.textContent = String(day);

          const nameEl = document.createElement("div");
          nameEl.className = "day-name";

          dayEl.appendChild(numberEl);
          dayEl.appendChild(nameEl);

          dayEl.addEventListener("mousedown", (event) => {
            event.preventDefault();
            handleDayMouseDown(dateKey);
          });

          dayEl.addEventListener("mouseenter", () => {
            handleDayMouseEnter(dateKey);
          });

          dayElements.set(dateKey, { dayEl, nameEl });
          grid.appendChild(dayEl);
        }

        monthEl.appendChild(title);
        monthEl.appendChild(weekdaysEl);
        monthEl.appendChild(grid);
        calendarEl.appendChild(monthEl);
      }

      updateDayStates();
    }

    function updateDayStates() {
      const target = getTargetEmployee();
      const targetName = target ? target.shortName : "";

      for (const [dateKey, refs] of dayElements.entries()) {
        const { dayEl, nameEl } = refs;

        dayEl.classList.remove("blocked", "selected-temp");
        dayEl.style.backgroundColor = "#fff";
        nameEl.textContent = "";

        const occupant = getOccupantByDate(dateKey);

        if (occupant) {
          dayEl.style.backgroundColor = occupant.color;
          nameEl.textContent = occupant.shortName;

          if (!target || occupant.employeeId !== target.id) {
            dayEl.classList.add("blocked");
          }
        }

        if (tempSelection.has(dateKey)) {
          dayEl.style.backgroundColor = colorEl.value;
          nameEl.textContent = targetName || "Selección";
          dayEl.classList.add("selected-temp");
        }
      }

      updateCounter();
      updateColorPreview();
    }

    function handleDayMouseDown(dateKey) {
      const target = getTargetEmployee();
      if (!target) {
        alert("Selecciona un empleado.");
        return;
      }

      if (!isAuthenticated()) {
        alert("PIN incorrecto.");
        return;
      }

      if (!canTargetEditDate(dateKey)) {
        const occupant = getOccupantByDate(dateKey);
        updateStatus(`El día ${formatDate(dateKey)} ya está ocupado por ${occupant?.shortName || "otro empleado"}.`);
        isMouseDown = false;
        dragMode = null;
        return;
      }

      isMouseDown = true;

      if (tempSelection.has(dateKey)) {
        dragMode = "remove";
        tempSelection.delete(dateKey);
      } else {
        if (tempSelection.size >= MAX_DAYS) {
          updateStatus(`No puedes seleccionar más de ${MAX_DAYS} días.`);
          isMouseDown = false;
          dragMode = null;
          return;
        }
        dragMode = "add";
        tempSelection.add(dateKey);
      }

      updateDayStates();
    }

    function handleDayMouseEnter(dateKey) {
      if (!isMouseDown || !dragMode) return;

      const target = getTargetEmployee();
      if (!target || !isAuthenticated()) return;

      if (!canTargetEditDate(dateKey)) return;

      if (dragMode === "add") {
        if (!tempSelection.has(dateKey) && tempSelection.size < MAX_DAYS) {
          tempSelection.add(dateKey);
        }
      } else if (dragMode === "remove") {
        tempSelection.delete(dateKey);
      }

      updateDayStates();
    }

    editBtn.addEventListener("click", () => {
      const target = getTargetEmployee();
      if (!target) {
        alert("Selecciona un empleado.");
        return;
      }

      if (!isAuthenticated()) {
        alert("PIN incorrecto.");
        return;
      }

      const record = vacations[target.id];

      if (!record) {
        tempSelection = new Set();
        colorEl.value = getStoredOrDefaultColor(target.id);
        updateStatus(`No hay vacaciones guardadas todavía para ${target.shortName}.`);
        updateDayStates();
        return;
      }

      tempSelection = new Set(record.dates || []);
      colorEl.value = record.color || getStoredOrDefaultColor(target.id);
      updateStatus(`Editando vacaciones de ${target.shortName}. Puedes añadir o quitar días.`);
      updateDayStates();
    });

    clearSelectionBtn.addEventListener("click", () => {
      tempSelection = new Set();
      updateStatus("Selección temporal borrada.");
      updateDayStates();
    });

    saveBtn.addEventListener("click", async () => {
      const target = getTargetEmployee();
      if (!target) {
        alert("Selecciona un empleado.");
        return;
      }

      if (!isAuthenticated()) {
        alert("PIN incorrecto.");
        return;
      }

      if (tempSelection.size === 0) {
        alert("Selecciona al menos un día.");
        return;
      }

      if (tempSelection.size > MAX_DAYS) {
        alert(`No puedes guardar más de ${MAX_DAYS} días.`);
        return;
      }

      for (const dateKey of tempSelection) {
        const occupant = getOccupantByDate(dateKey);
        if (occupant && occupant.employeeId !== target.id) {
          alert(`No se puede guardar. El día ${formatDate(dateKey)} ya está ocupado por ${occupant.shortName}.`);
          return;
        }
      }

      await set(ref(db, "vacations/" + target.id), {
        shortName: target.shortName,
        fullName: target.fullName,
        role: target.role,
        aliases: target.aliases,
        color: colorEl.value,
        dates: [...tempSelection].sort()
      });

      updateStatus(`Vacaciones guardadas para ${target.shortName}.`);
      tempSelection = new Set();
      updateDayStates();
    });

    clearMineBtn.addEventListener("click", async () => {
      const target = getTargetEmployee();
      if (!target) {
        alert("Selecciona un empleado.");
        return;
      }

      if (!isAuthenticated()) {
        alert("PIN incorrecto.");
        return;
      }

      const record = vacations[target.id];
      if (!record) {
        alert("No hay vacaciones guardadas para este empleado.");
        return;
      }

      const confirmed = confirm(`¿Seguro que quieres borrar todas las vacaciones de ${target.shortName}?`);
      if (!confirmed) return;

      await remove(ref(db, "vacations/" + target.id));
      tempSelection = new Set();
      updateStatus(`Vacaciones borradas para ${target.shortName}.`);
      updateDayStates();
    });

    exportPdfBtn.addEventListener("click", () => {
      renderPrintSummary();
      printDateEl.textContent = `Fecha de exportación: ${formatExportDate()}`;
      window.print();
    });

    colorEl.addEventListener("input", () => {
      updateDayStates();
    });

    employeeSelectEl.addEventListener("change", () => {
      tempSelection = new Set();
      const current = getSelectedEmployee();
      if (current) {
        colorEl.value = getStoredOrDefaultColor(current.id);
        if (!current.admin) {
          targetSelectEl.value = current.id;
        }
      }
      updateRoleUI();
      updateStatus("Empleado cambiado. Introduce el PIN para editar vacaciones.");
    });

    targetSelectEl.addEventListener("change", () => {
      tempSelection = new Set();
      const target = getTargetEmployee();
      if (target) {
        colorEl.value = getStoredOrDefaultColor(target.id);
      }
      updateRoleUI();
      updateStatus("Empleado de destino cambiado.");
    });

    document.addEventListener("mouseup", () => {
      isMouseDown = false;
      dragMode = null;
    });

    document.addEventListener("mouseleave", () => {
      isMouseDown = false;
      dragMode = null;
    });

    onValue(ref(db, "vacations"), (snapshot) => {
      vacations = snapshot.val() || {};
      renderSavedList();
      renderPrintSummary();
      updateRoleUI();
    });

    populateSelects();
    createCalendar();
    colorEl.value = getStoredOrDefaultColor("igor");
    updateRoleUI();
  </script>
</body>
</html>
